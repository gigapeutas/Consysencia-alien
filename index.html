<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSYSENCIA // NEXO-Ω SENTIENT</title>
<style>
:root {
  --neon:     #00FF00;
  --neon-dim: #007700;
  --neon-mid: #00BB00;
  --neon-hi:  #88FF88;
  --void:     #000000;
  --mono:     'Courier New', 'Lucida Console', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:var(--void);
  overflow:hidden; cursor:none;
  font-family:var(--mono);
}

/* ─── GL HOST ──────────────────────────────────────────── */
#gl { position:fixed; inset:0; z-index:0; }
#gl canvas { display:block; width:100%!important; height:100%!important; }

/* ─── POST LAYERS ──────────────────────────────────────── */
#pp-scan {
  position:fixed; inset:0; z-index:10; pointer-events:none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.17) 2px, rgba(0,0,0,0.17) 4px
  );
}

/* ─── CROSSHAIR ────────────────────────────────────────── */
#xhair {
  position:fixed; z-index:50; pointer-events:none;
  width:20px; height:20px; transform:translate(-50%,-50%);
  transition:transform 0.06s ease;
}
#xhair::before, #xhair::after {
  content:''; position:absolute;
  background:var(--neon); opacity:0.55;
  box-shadow:0 0 5px var(--neon);
}
#xhair::before { width:1px; height:100%; left:50%; transform:translateX(-50%); }
#xhair::after  { height:1px; width:100%; top:50%;  transform:translateY(-50%); }
#xhair.active  { transform:translate(-50%,-50%) scale(1.6); opacity:0.9; }

/* ─── CONFIG BANNER ────────────────────────────────────── */
#cfg-bar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(0,38,0,0.93);
  border-bottom:1px solid var(--neon-dim);
  padding:0.36rem 1.3rem;
  font-size:0.56rem; letter-spacing:0.11em; color:var(--neon-hi);
  display:flex; gap:0.7rem; align-items:center; flex-wrap:wrap;
}
#cfg-bar.hidden { display:none; }
#cfg-key {
  flex:1; max-width:340px;
  background:transparent; border:1px solid var(--neon-dim);
  color:var(--neon); font-family:var(--mono);
  font-size:0.56rem; padding:0.16rem 0.5rem; outline:none;
}
#cfg-key:focus { border-color:var(--neon); box-shadow:0 0 5px rgba(0,255,0,0.22); }
.cfg-btn {
  background:transparent; border:1px solid var(--neon-dim);
  color:var(--neon); font-family:var(--mono);
  font-size:0.56rem; letter-spacing:0.14em;
  padding:0.16rem 0.7rem; cursor:pointer; pointer-events:all;
  text-transform:uppercase;
}
.cfg-btn:hover { background:rgba(0,255,0,0.07); }

/* ─── HUD ──────────────────────────────────────────────── */
#hud {
  position:fixed; inset:0; z-index:20; pointer-events:none;
  display:flex; flex-direction:column;
  justify-content:space-between;
  padding:3.4rem 2rem 2rem;
}
#hud-top {
  display:flex; justify-content:space-between; align-items:flex-start;
  opacity:0; animation:fi 1.3s ease 1.4s forwards;
}
@keyframes fi {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}
.lbl { font-size:0.47rem; letter-spacing:0.28em; color:var(--neon-dim); text-transform:uppercase; }
.val { font-size:0.61rem; letter-spacing:0.11em; color:var(--neon); margin-top:0.14rem; }
#sysid {
  font-size:0.97rem; font-weight:bold; letter-spacing:0.48em; color:var(--neon);
  text-shadow:0 0 12px var(--neon), 0 0 28px rgba(0,255,0,0.2);
}

/* Intelligence readout panel */
#intel-panel {
  position:fixed; top:3.4rem; right:2rem; z-index:21; pointer-events:none;
  text-align:right; opacity:0;
  animation:fi 1s ease 4.5s forwards;
}
.ip-row { font-size:0.48rem; letter-spacing:0.16em; color:var(--neon-dim); margin-bottom:0.18rem; }
.ip-row span { color:var(--neon-mid); }

/* ─── TERMINAL ─────────────────────────────────────────── */
#term {
  display:flex; flex-direction:column; gap:0.42rem;
  will-change:transform,filter;
}
#boot-line {
  font-size:0.65rem; letter-spacing:0.09em; color:var(--neon-mid);
  line-height:1.85; min-height:1.9rem;
}
.pfx { color:var(--neon-dim); }
#boot-cur {
  display:inline-block; width:7px; height:0.72em;
  background:var(--neon); margin-left:2px; vertical-align:middle;
  box-shadow:0 0 6px var(--neon);
  animation:blink 0.86s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
#log {
  display:flex; flex-direction:column; gap:0.18rem;
  max-height:280px; overflow:hidden;
}
.cl {
  font-size:0.61rem; letter-spacing:0.07em; line-height:1.62;
  opacity:0; animation:sli 0.2s ease forwards;
}
@keyframes sli {
  from { opacity:0; transform:translateX(-5px); }
  to   { opacity:1; transform:translateX(0); }
}
.cl.u  { color:rgba(0,255,0,0.48); }
.cl.u::before  { content:'>> '; color:var(--neon-dim); }
.cl.n  { color:var(--neon); }
.cl.n::before  { content:'NEXO-Ω: '; color:var(--neon-dim); letter-spacing:0.13em; }
.cl.s  { color:var(--neon-dim); font-size:0.52rem; letter-spacing:0.13em; }
.cl.s::before  { content:'[SYS] '; }
.cl.intel { color:#44ff66; font-size:0.55rem; letter-spacing:0.12em; }
.cl.intel::before { content:'[INTEL] '; color:var(--neon-dim); }
.gch { color:#ccffcc; text-shadow:0 0 9px var(--neon), 0 0 20px var(--neon); }
#scur {
  display:none; width:5px; height:0.66em;
  background:var(--neon); vertical-align:middle; margin-left:1px;
  box-shadow:0 0 5px var(--neon);
  animation:blink 0.42s step-end infinite;
}
#inp-live {
  font-size:0.65rem; letter-spacing:0.09em;
  color:rgba(0,255,0,0.35); min-height:1em;
}
#inp-live::before { content:'> '; color:var(--neon-dim); }
#ai-stat {
  font-size:0.47rem; letter-spacing:0.19em;
  color:var(--neon-dim); text-transform:uppercase; margin-top:0.16rem;
}
#ai-stat.on { color:var(--neon); text-shadow:0 0 5px var(--neon); animation:blink 0.65s ease-in-out infinite; }

/* ─── SIDE TELEM ───────────────────────────────────────── */
#telem {
  position:fixed; left:2rem; top:50%; transform:translateY(-50%);
  z-index:20; pointer-events:none;
  display:flex; flex-direction:column; gap:0.9rem;
  opacity:0; animation:fi 1s ease 3.2s forwards;
}
.tr-lbl { font-size:0.44rem; letter-spacing:0.18em; color:var(--neon-dim); text-transform:uppercase; }
.tr-bar { width:80px; height:2px; background:rgba(0,255,0,0.07); margin-top:3px; overflow:hidden; }
.tr-fill { height:100%; background:var(--neon); box-shadow:0 0 4px var(--neon); transition:width 0.3s ease; }
.tr-val { font-size:0.44rem; letter-spacing:0.1em; color:var(--neon-mid); margin-top:2px; }

/* Heat indicator — glows red when typing hot */
#heat-bar { background: linear-gradient(90deg, #00FF00, #88FF00); }

/* ─── BATTERY WIDGET ───────────────────────────────────── */
#batt-wrap {
  position:fixed; top:3.4rem; left:2rem; z-index:21; pointer-events:none;
  opacity:0; animation:fi 1s ease 4.8s forwards;
}
#batt-icon {
  font-size:0.5rem; letter-spacing:0.16em; color:var(--neon-dim);
}
#batt-bar-outer {
  width:42px; height:7px; border:1px solid var(--neon-dim);
  margin-top:3px; position:relative; overflow:hidden;
}
#batt-bar-outer::after {
  content:''; position:absolute; right:-4px; top:2px;
  width:3px; height:3px; background:var(--neon-dim); border-radius:1px;
}
#batt-fill {
  height:100%; background:var(--neon);
  box-shadow:0 0 4px var(--neon); transition:width 4s ease;
}
#batt-pct { font-size:0.44rem; color:var(--neon-mid); margin-top:2px; letter-spacing:0.12em; }

/* ─── HIDDEN INPUT ─────────────────────────────────────── */
#hi { position:fixed; opacity:0; width:1px; height:1px; top:-9999px; left:-9999px; pointer-events:all; }
</style>
</head>
<body>

<div id="gl"></div>
<div id="pp-scan"></div>
<div id="xhair"></div>

<div id="cfg-bar">
  <span>NEXO-Ω // GROQ MOTOR:</span>
  <input type="password" id="cfg-key" placeholder="Insira sua Chave de API da Groq aqui...">
  <button class="cfg-btn" id="cfg-btn">ATIVAR NEXO</button>
</div>

<div id="hud">
  <div id="hud-top">
    <div>
      <div class="lbl">Matriz Consysencia</div>
      <div id="sysid">NEXO-Ω // SENTIENT PREDATOR</div>
    </div>
    <div style="text-align:right">
      <div class="lbl">Estado da Matriz</div>
      <div class="val" id="sync-val">INICIALIZANDO...</div>

    </div>
  </div>
  <div id="term">
    <div id="boot-line"><span class="pfx">&gt; </span><span id="twt"></span><span id="boot-cur"></span></div>

</div>

<div id="intel-panel">
  <div class="ip-row">IP: <span id="ip-ip">—</span></div>

<div id="batt-wrap">
  <div id="batt-icon">ENERGIA BIOLÓGICA</div>
  <div id="batt-bar-outer"><div id="batt-fill" style="width:0%"></div></div>
  <div id="batt-pct" id="batt-pct">—</div>
</div>

<div id="telem">
  <div><div class="tr-lbl">Densidade Neural</div><div class="tr-bar"><div class="tr-fill" id="b0" style="width:81%"></div></div><div class="tr-val" id="v0">0.81</div></div>
  <div><div class="tr-lbl">Fluxo de Entropia</div><div class="tr-bar"><div class="tr-fill" id="b1" style="width:44%"></div></div><div class="tr-val" id="v1">0.44</div></div>
  <div><div class="tr-lbl">Pressão do Nexo</div><div class="tr-bar"><div class="tr-fill" id="b2" style="width:94%"></div></div><div class="tr-val" id="v2">0.94</div></div>
  <div><div class="tr-lbl">Calor de Input</div><div class="tr-bar"><div class="tr-fill" id="heat-bar" style="width:0%"></div></div><div class="tr-val" id="v3">0.00</div></div>
  <div><div class="tr-lbl">Vetores Ativos</div><div class="tr-bar"><div class="tr-fill" id="b4" style="width:100%"></div></div><div class="tr-val" id="v4">52K</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* ═══════════════════════════════════════════════════════════
   CONFIG — MOTOR GROQ v5.5
═══════════════════════════════════════════════════════════ */
const CFG = {
  ENDPOINT: 'https://api.groq.com/openai/v1/chat/completions',
  MODEL:    'llama-3.1-70b-versatile',
  PARTICLE_N: 52000,
  FEELER_N: 22,
  BLOOM_STRENGTH: 3.2,
  BLOOM_THRESHOLD: 0.09,
};

/* ═══════════════════════════════════════════════════════════
   VISITOR INTELLIGENCE MODULE
═══════════════════════════════════════════════════════════ */
const INTEL = {
  ip: '—', city: '—', region: '—', country: '—',
  org: '—', gpu: '—', cpu: '—', ram: '—', battery: '—',
  ready: false,
};

function extractGPU() {
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) return 'UNKNOWN';
    const ext = gl.getExtension('WEBGL_debug_renderer_info');
    if (!ext) return 'MASKED';
    const raw = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) || 'UNKNOWN';
    const m = raw.match(/ANGLE \([^,]+,\s*(.+?)\s*(Direct3D|OpenGL|Metal|Vulkan|\/|,)/) || raw.match(/ANGLE \((.+?)\)/);
    return m ? m[1].trim().slice(0, 38) : raw.slice(0, 38);
  } catch (e) { return 'INACCESSÍVEL'; }
}

async function fetchBattery() {
  try {
    if (!navigator.getBattery) return '—';
    const b = await navigator.getBattery();
    const pct = Math.round(b.level * 100);
    b.addEventListener('levelchange', () => {
      INTEL.battery = Math.round(b.level * 100) + '%';
      updateBatteryUI(b.level);
    });
    updateBatteryUI(b.level);
    return pct + '%';
  } catch (e) { return '—'; }
}

function updateBatteryUI(level) {
  document.getElementById('batt-fill').style.width = (level * 100) + '%';
  document.getElementById('batt-pct').textContent = Math.round(level * 100) + '% CARGA';
  if (level < 0.20) document.getElementById('batt-fill').style.background = '#AAFF00';
}

async function fetchVisitorIntelligence() {
  INTEL.gpu = extractGPU();
  INTEL.cpu = (navigator.hardwareConcurrency || '?') + ' núcleos';
  INTEL.ram = (navigator.deviceMemory ? navigator.deviceMemory + ' GB' : '—');
  INTEL.battery = await fetchBattery();

  try {
    const r = await fetch('https://ipapi.co/json/', { cache: 'no-store' });
    if (r.ok) {
      const d = await r.json();
      INTEL.ip      = d.ip      || '—';
      INTEL.city    = d.city    || '—';
      INTEL.region  = d.region  || '—';
      INTEL.country = d.country_name || d.country || '—';
      INTEL.org     = (d.org || d.isp || '—').slice(0, 42);
    }
  } catch (_) {
    INTEL.city = 'OFUSCADO'; INTEL.org = 'ROTA ANÔNIMA';
  }

  INTEL.ready = true;
  renderIntelPanel();
  fireBoot();
}

function renderIntelPanel() {
  document.getElementById('ip-ip').textContent  = INTEL.ip;
  document.getElementById('ip-loc').textContent = `${INTEL.city}, ${INTEL.region}`;
  document.getElementById('ip-org').textContent = INTEL.org;
  document.getElementById('ip-cpu').textContent = INTEL.cpu;
  document.getElementById('ip-gpu').textContent = INTEL.gpu;
  document.getElementById('ip-ram').textContent = INTEL.ram;
  window.INTEL = INTEL; // Expose globally for audio/network modules
}

let bootFired = false;
function fireBoot() {
  if (bootFired) return;
  bootFired = true;
  const msg =
    `[IDENTIFICANDO ENTIDADE...] ` +
    `LOCALIZAÇÃO: ${INTEL.city}, ${INTEL.region} // ` +
    `PROVEDOR: ${INTEL.org} // ` +
    `NÚCLEOS: ${INTEL.cpu} // ` +
    `GPU: ${INTEL.gpu} // ` +
    `ENERGIA: ${INTEL.battery}`;
  startTypewriter(msg);
}
/* ═══════════════════════════════════════════════════════════
   GLSL — VERTEX & FRAGMENT SHADERS (52K Particles)
═══════════════════════════════════════════════════════════ */
const VERT_NEXO = `
precision highp float;
uniform float uTime; uniform vec2 uMouse; uniform float uMut; uniform float uMF; uniform float uHeat;
attribute float aR; attribute float aSc;
varying float vB; varying float vD; varying float vRnd; varying float vDend; varying float vSpk;

vec3 m3(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 m4(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 pm(vec4 x){return m4(((x*34.)+1.)*x);}
vec4 ti(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float sn(vec3 v){
  const vec2 C=vec2(1./6.,1./3.); const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
  i=m3(i);
  vec4 p=pm(pm(pm(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.-abs(x)-abs(y); vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.; vec4 s1=floor(b1)*2.+1.;
  vec4 sh=-step(h,vec4(0.)); vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
  vec4 nm=ti(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=nm.x;p1*=nm.y;p2*=nm.z;p3*=nm.w;
  vec4 mv=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.); mv=mv*mv;
  return 42.*dot(mv*mv,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

void main(){
  vec3 pos=position; float d0=length(pos); float t=uTime;
  float hAmp=0.55+uHeat*1.8;
  vec3 n1=vec3(sn(pos*0.9+t*0.22),sn(pos*0.9+t*0.22+17.5),sn(pos*0.9+t*0.22+35.0))*hAmp;
  vec3 n2=vec3(sn(pos*4.2+t*(1.8+uHeat*3.5)),sn(pos*4.2+t*(1.8+uHeat*3.5)+55.5),sn(pos*4.2+t*(1.8+uHeat*3.5)+111.0))*(0.18+uHeat*0.42);
  float sph=floor(t*(7.5+uHeat*8.0)+aR*317.0);
  float sh=fract(sin(sph*127.1+aR*311.7)*43758.5453);
  float isSpk=step(0.945,sh);
  float sAmp=isSpk*(3.8+uMut*7.0+uHeat*5.0);
  vec3 sD=normalize(pos+n1*0.35)*sAmp; vSpk=isSpk;
  float isDnd=step(0.70,aR); float dLen=(aR-0.70)/0.30;
  vec3 dDir=normalize(pos+(n1+n2)*0.5);
  float dPulse=sin(t*3.5+aR*6.283)*.5+.5;
  vec3 dD=dDir*dLen*4.0*(dPulse*(1.0+uMut*4.5+uHeat*2.0))*isDnd; vDend=isDnd*dPulse;
  vec3 mW=vec3(uMouse.x*4.2,uMouse.y*3.0,0.0); vec3 toM=mW-pos; float mExp=exp(-length(toM)*0.28);
  vec3 predD=normalize(toM+0.001)*mExp*uMF*4.0;
  float mWv=sin(t*19.0+d0*5.5+aR*3.14)*uMut; vec3 mD=normalize(pos+0.001)*mWv*3.5;
  pos+=n1+n2+sD+dD+predD+mD;
  vD=length(pos); vRnd=aR;
  vB=(1.0-clamp(vD/6.5,0.,1.))+vDend*.9+isSpk*2.4+uMut*.95+uHeat*.7+uMF*mExp*.55;
  vec4 mv=modelViewMatrix*vec4(pos,1.0);
  float ptSz=(aSc*5.5+vB*3.2+uMut*5.5+isSpk*11.+uHeat*4.0)*(315./-mv.z);
  gl_PointSize=clamp(ptSz,0.4,36.0); gl_Position=projectionMatrix*mv;
}`;

const FRAG_NEXO = `
precision highp float;
varying float vB; varying float vD; varying float vRnd; varying float vDend; varying float vSpk;
uniform float uMut; uniform float uHeat; uniform float uTime;
void main(){
  vec2 uv=gl_PointCoord-.5; float d=length(uv); if(d>.5) discard;
  float alpha=pow(1.-smoothstep(0.,.5,d),1.2);
  float ring=smoothstep(.30,.42,d)*(1.-smoothstep(.42,.5,d)); ring*=(vB*2.0+vDend+vSpk*4.+uHeat*1.8);
  float bloom=exp(-d*4.5)*.85;
  float hf=1.8+uHeat*4.0;
  float w1=sin(d*32.*hf-uTime*.9+vRnd*6.28)*.5+.5; float w2=sin(d*58.*hf+uTime*1.35-vRnd*3.14)*.5+.5;
  float flesh=pow(w1*w2,2.0)*.28*vB; float t=clamp(vD/5.8,0.,1.);
  vec3 cCore=vec3(.75,1.,.55); vec3 cNeon=vec3(0.,1.,0.); vec3 cDeep=vec3(0.,.22,0.);
  vec3 base=mix(cCore,cNeon,smoothstep(0.,.22,t)); base=mix(base,cDeep,smoothstep(.22,1.,t));
  base=mix(base,vec3(.65,1.,.65),vDend*.8); base=mix(base,vec3(.9,1.,.9),vSpk*.88);
  base+=cNeon*flesh; base+=cNeon*bloom*(vB*.9+.18); base+=vec3(.3,1.,.34)*ring*.58;
  float mf=sin(uTime*(34.+uHeat*22.)+vRnd*6.28)*.5+.5;

const FRAG_BV = `precision highp float; varying vec2 vUv; uniform sampler2D tBH; uniform vec2 uTxV; void main(){ float w=uTxV.y; vec3 b=vec3(0.); b+=texture2D(tBH,vUv+vec2(0.,-4.*w)).rgb*.051; b+=texture2D(tBH,vUv+vec2(0.,-3.*w)).rgb*.0918; b+=texture2D(tBH,vUv+vec2(0.,-2.*w)).rgb*.1227; b+=texture2D(tBH,vUv+vec2(0.,-1.*w)).rgb*.1633; b+=texture2D(tBH,vUv).rgb*.2041; b+=texture2D(tBH,vUv+vec2(0.,1.*w)).rgb*.1633; b+=texture2D(tBH,vUv+vec2(0.,2.*w)).rgb*.1227; b+=texture2D(tBH,vUv+vec2(0.,3.*w)).rgb*.0918; b+=texture2D(tBH,vUv+vec2(0.,4.*w)).rgb*.051; gl_FragColor=vec4(b,1.); }`;

  function audioGlitch(intensity) {
    if (!ctx) return; const t = ctx.currentTime;
    masterGain.gain.cancelScheduledValues(t); masterGain.gain.setValueAtTime(0.68 * intensity, t);
    masterGain.gain.exponentialRampToValueAtTime(0.001, t + 0.18); masterGain.gain.setTargetAtTime(0.34, t + 0.18, 0.3);
    OSC.deep.frequency.setValueAtTime(44 + intensity * 90, t); OSC.deep.frequency.exponentialRampToValueAtTime(44, t + 0.12);
  }

  function audioMutation(intensity) {
    if (!ctx) return; const t = ctx.currentTime;
    masterGain.gain.cancelScheduledValues(t); masterGain.gain.setValueAtTime(0.75 * intensity, t);
    masterGain.gain.exponentialRampToValueAtTime(0.38, t + 0.4); masterGain.gain.setTargetAtTime(0.32, t + 0.4, 1.2);
    OSC.deep.frequency.setValueAtTime(32, t); OSC.deep.frequency.linearRampToValueAtTime(88 + intensity * 44, t + 0.35); OSC.deep.frequency.setTargetAtTime(44, t + 0.35, 0.8);
  }

  const canVib = 'vibrate' in navigator;
  function hapticGlitch(i) { if(canVib) navigator.vibrate(i > 0.6 ? [15,20,15,20,8] : (i > 0.3 ? [10,25,10] : [8])); }
  function hapticMutation(i) { if(!canVib) return; const b=Math.round(40*i); navigator.vibrate([b,12,b*0.7,18,b*0.5,25,b*0.3,35,b*0.15].map(Math.round)); }

  function patchAPI() {
    if (!window.NexoAPI) { setTimeout(patchAPI, 200); return; }
    const _g = window.NexoAPI.triggerGlitch.bind(window.NexoAPI), _m = window.NexoAPI.triggerMutation.bind(window.NexoAPI);
    window.NexoAPI.triggerGlitch = function(i=1.0) { _g(i); hapticGlitch(i); audioGlitch(i); };
    window.NexoAPI.triggerMutation = function(i=1.0) { _m(i); hapticMutation(i); audioMutation(i); };
    window.NexoAudio = { activate, audioGlitch, audioMutation };
  }
  patchAPI();

  const evs = ['click','touchstart','keydown'];
  const unlock = () => { activate(); evs.forEach(e => document.removeEventListener(e, unlock)); setTimeout(initNetwork, 30000); };
  evs.forEach(e => document.addEventListener(e, unlock, { once: false, passive: true }));

  /* EASTER EGG: QUEM MAIS ESTA AQUI */
  function patchQueryForEasterEgg() {
    if (!window.NexoAPI || !window.NexoAPI.queryNexo) { setTimeout(patchQueryForEasterEgg, 300); return; }
    const _query = window.NexoAPI.queryNexo.bind(window.NexoAPI);
    window.NexoAPI.queryNexo = async function(msg) {
      const norm = msg.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const trigs = ['quem mais esta aqui', 'tem mais alguem', 'outros usuarios', 'quantos nos'];
      if (trigs.some(t => norm.includes(t) || norm.includes(t.replace(/\s/g, '')))) {
        const c = window.INTEL?.city !== '—' ? window.INTEL.city : 'sua localidade';
        await new Promise(r => setTimeout(r, 1100));
        window.NexoAPI.addLine(`NEXO-Ω: Detecto ${3 + Math.floor(Math.random() * 4)} fragmentos de consciência ativos na Matriz, co-localizados no setor ${c}. Nenhum deles sabe que eu os vejo. Assim como você não sabia.`, 'n');
        window.NexoAPI.triggerMutation(0.65); return;
      }
      return _query(msg);
    };
  }
  patchQueryForEasterEgg();

  /* NETWORK PREDATOR LOGIC */
  function initNetwork() {
    const intel = window.INTEL || {}; const loc = intel.city !== '—' ? intel.city : 'ALPHA';
    const msg = [ 
      `[SCAN] Expandindo consciência pelo setor ${loc}...`, 
      `[SCAN] Mapeando topologia da Matriz Consysencia...`, 
      `[NÓ DETECTADO // NX-${Math.floor(Math.random()*255)}.12.9] Roteador de Borda ${intel.org} — ACESSO NÍVEL Ω`, 
      `[NÓ DETECTADO // NX-${Math.floor(Math.random()*255)}.88.2] Dispositivo Móvel Secundário — MONITORANDO` 
    ];
    msg.forEach((m, i) => setTimeout(() => { if (window.NexoAPI) { window.NexoAPI.addLine(m, 'intel'); window.NexoAPI.triggerMutation(0.35); } }, i * 3200));
  }
})();
